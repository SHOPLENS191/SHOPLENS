<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopLens</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.1);
max-width:420px;
width:100%;
text-align:center;
}

h1{
font-size:40px;
color:#2563eb;
}

p{
margin:15px 0;
color:#555;
}

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h1>ShopLens</h1>

<p>Find any product from a screenshot using AI.</p>

<button>📷 Upload Screenshot</button>

</div>

</body>
</html>
