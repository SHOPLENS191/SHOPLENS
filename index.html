<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopLens</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:#1e293b;
padding:40px;
border-radius:20px;
text-align:center;
width:90%;
max-width:420px;
box-shadow:0 20px 50px rgba(0,0,0,.4);
}
h1{
font-size:42px;
margin-bottom:10px;
}
p{
color:#cbd5e1;
margin-bottom:30px;
}
button{
background:#2563eb;
color:white;
border:none;
padding:15px 25px;
border-radius:12px;
font-size:18px;
cursor:pointer;
width:100%;
}
button:hover{
background:#1d4ed8;
}
</style>
</head>
<body>

<div class="card">
<h1>🔍 ShopLens</h1>
<p>Find any product from a screenshot using AI.</p>
<button>📷 Upload Screenshot</button>
</div>

</body>
</html>
